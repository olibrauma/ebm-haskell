name:                ebm-mars
version:             0.1.0.0
github:              "yourusername/ebm-mars"
license:             MIT
author:              "Your Name"
maintainer:          "your.email@example.com"
copyright:           "2026 Your Name"

extra-source-files:
- README.md
- CHANGELOG.md

synopsis:            Energy Balance Model for Mars - Haskell Implementation
category:            Science

description:         Please see the README on GitHub at <https://github.com/yourusername/ebm-mars#readme>

dependencies:
- base >= 4.7 && < 5
- vector >= 0.12
- mtl >= 2.2
- optparse-applicative >= 0.16
- bytestring >= 0.10
- text >= 1.2
- scientific >= 0.3
- directory >= 1.3
- filepath >= 1.4

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints
- -O2

library:
  source-dirs: src

executables:
  ebm-mars-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - ebm-mars

tests:
  ebm-mars-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - ebm-mars
    - hspec >= 2.7
    - QuickCheck >= 2.14
